# Render deployment blueprint for MedCloud.
# Render is a PaaS: we give it our code/Docker image and it runs it for us, managing
# the servers and runtime. Create a new "Blueprint" on render.com pointing at this repo.
services:
  - type: web
    name: medcloud
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # SECRET_KEY is generated by Render (never hardcoded/committed).
      - key: SECRET_KEY
        generateValue: true
      # Set these in the Render dashboard to enable the real cloud integrations.
      # If left empty, the app runs in documented fallback mode and still works.
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: medcloud
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OCR_API_URL
        sync: false
      - key: OCR_API_KEY
        sync: false
      - key: VISION_API_URL
        sync: false
      - key: VISION_API_KEY
        sync: false
