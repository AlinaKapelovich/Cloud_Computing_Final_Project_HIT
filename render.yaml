# Render deployment blueprint for MedCloud.
# Render is a PaaS: we give it our code/Docker image and it runs it for us, managing
# the servers and runtime. Create a new "Blueprint" on render.com pointing at this repo.
services:
  - type: web
    name: medcloud
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # SECRET_KEY is generated by Render (never hardcoded/committed).
      - key: SECRET_KEY
        generateValue: true
      # Debug must stay off in a deployed environment.
      - key: FLASK_DEBUG
        value: "0"
      # Set these in the Render dashboard to enable the real cloud integrations.
      # If left empty, the app runs in documented fallback mode and still works.
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: medcloud
      # SEED_DEMO_USERS is left unset by default: if MONGO_URI is also left empty,
      # the app uses the in-memory demo database and seeds demo accounts automatically
      # (safe — nothing persists). If you DO set MONGO_URI to a real Atlas database and
      # still want the demo1234 accounts available for an academic defense, set this to
      # "true" explicitly in the Render dashboard. It is never silently enabled on a
      # real, persistent database.
      - key: SEED_DEMO_USERS
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_OCR_MODEL
        value: microsoft/trocr-base-handwritten
      - key: OCR_API_URL
        sync: false
      - key: OCR_API_KEY
        sync: false
      - key: VISION_API_URL
        sync: false
      - key: VISION_API_KEY
        sync: false
