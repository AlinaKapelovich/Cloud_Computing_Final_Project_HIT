# docker-compose runs MedCloud together with a MongoDB container.
# This demonstrates a small multi-container (distributed-ish) setup: the web app and
# the database run as separate services that talk over a network.
#
# Run:   docker compose up --build
# Visit: http://localhost:5000   (demo users are seeded automatically)
#
# The app still works if you remove the mongo service — it falls back to an in-memory
# database. With mongo present, data persists in the named volume.
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Point the app at the mongo service. Comment this out to use the in-memory fallback.
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB_NAME: "medcloud"
      SECRET_KEY: "compose-dev-secret-change-me"
      # External service keys are intentionally empty here -> documented fallbacks are used.
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads
      - ./generated_pdfs:/app/generated_pdfs

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
