[pytest]
# `pythonpath = .` lets the tests import the `app` package when running plain `pytest`
# from the project root (as well as `python -m pytest`).
pythonpath = .
testpaths = tests
# Integration tests (real network / real Tesseract binary) are excluded from the
# standard run for determinism — see tests/conftest.py. Run them explicitly with:
#   pytest -m integration
addopts = -q -m "not integration"
markers =
    integration: exercises a real external dependency (network call or the Tesseract binary); skipped by default, run explicitly with `pytest -m integration`
